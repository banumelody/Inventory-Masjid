# ============================================
# Docker Compose - Production
# ============================================
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: always
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./src/storage/app:/var/www/storage/app
      - ./src/storage/logs:/var/www/storage/logs
    networks:
      - inventory_network
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  web:
    image: nginx:alpine
    container_name: inventory_web
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventory_network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: inventory_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-inventory_masjid}
      MYSQL_USER: ${DB_USERNAME:-inventory_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - inventory_db_data:/var/lib/mysql
    networks:
      - inventory_network
    # Don't expose DB port in production
    # ports:
    #   - "3306:3306"

networks:
  inventory_network:
    driver: bridge

volumes:
  inventory_db_data:
