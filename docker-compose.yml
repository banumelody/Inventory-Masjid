services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - inventory_network
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: inventory_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventory_network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: inventory_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory_masjid
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - inventory_db_data:/var/lib/mysql
    networks:
      - inventory_network

networks:
  inventory_network:
    driver: bridge

volumes:
  inventory_db_data:
